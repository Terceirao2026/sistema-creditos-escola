<!DOCTYPE html>
<html>
<head>
<title>Mudar Senha</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:10px;
width:300px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#4f46e5;
color:white;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<div class="card">

<h2>Mudar Senha</h2>

<form method="POST">

<input type="password" name="nova_senha" placeholder="Nova senha" required>

<button type="submit">Salvar</button>

</form>

</div>

<div class="suporte">
Se encontrou algum erro? 
<a href="/suporte">Entrar em contato com o suporte</a>
</div>

</body>
</html>
